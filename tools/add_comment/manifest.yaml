version: 1
tool:
  slug: add_comment
  name: Add Comment
  description: "Post a comment on the current task, authored as the calling agent. Used for findings, status updates, and conversational replies."
  builtin: true
  status: approved
  approved_at: "2026-05-11T00:00:00Z"
  approved_by: starforge-core

  capabilities:
    network:
      egress: ["starforge-internal"]
    filesystem:
      read: []
      write: []
    env_vars: ["STARFORGE_MEMBER_ID", "STARFORGE_CALLBACK_URL", "STARFORGE_CALLBACK_TOKEN"]

  inputs:
    - name: body
      type: string
      required: true
      description: "Comment body. Markdown allowed. No size limit beyond 8000 chars."
