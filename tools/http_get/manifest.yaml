version: 1
tool:
  slug: http_get
  name: HTTP GET
  description: "Fetch a URL via HTTP/HTTPS and return status code, headers, and a body preview (up to 800 bytes). Read-only — no POST/PUT/DELETE."
  builtin: true                       # implementation lives in nemoclaw/runner.py
  status: approved
  approved_at: "2026-05-11T00:00:00Z"
  approved_by: starforge-core

  capabilities:
    network:
      egress: ["any"]                 # arbitrary URL fetch; intended for accessibility checks
    filesystem:
      read: []
      write: []
    env_vars: []

  inputs:
    - name: url
      type: string
      required: true
      description: "Fully-qualified URL to GET. Both http and https accepted."
