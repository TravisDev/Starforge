<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Starforge — Sign in</title>
<style>
  :root {
    --bg:#0f1115; --panel:#161922; --panel2:#1c2030; --border:#2a2f3e;
    --text:#e6e8ee; --muted:#8a93a6; --accent:#6ea8fe; --error:#ff7171;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;display:flex;
    align-items:center;justify-content:center;padding:24px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    width:min(420px,100%);padding:28px}
  h1{font-size:20px;margin:0 0 16px}
  label{display:block;font-size:12px;color:var(--muted);margin:12px 0 4px}
  input{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);
    border-radius:6px;padding:10px;font:inherit}
  input:focus{outline:none;border-color:var(--accent)}
  button.primary{width:100%;margin-top:16px;padding:11px;border-radius:6px;
    border:1px solid var(--accent);background:var(--accent);color:#0b1020;
    font-weight:600;font:inherit;cursor:pointer}
  button.primary:disabled{opacity:0.6;cursor:not-allowed}
  .sso{margin-top:18px;display:flex;flex-direction:column;gap:8px}
  .sso a{display:block;text-align:center;padding:10px;border-radius:6px;
    border:1px solid var(--border);background:var(--panel2);color:var(--text);
    text-decoration:none;font-weight:500}
  .sso a:hover{border-color:var(--accent)}
  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);
    font-size:11px;text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .err{color:var(--error);font-size:13px;margin-top:12px;min-height:18px}
</style>
</head>
<body>
<div class="card">
  <h1>Sign in</h1>
  <form id="form" autocomplete="on">
    <label for="email">Email</label>
    <input id="email" type="email" required autofocus autocomplete="username" />
    <label for="pw">Password</label>
    <input id="pw" type="password" required autocomplete="current-password" />
    <div class="err" id="err"></div>
    <button class="primary" id="submit" type="submit">Sign in</button>
  </form>
  <div id="ssoWrap" style="display:none">
    <div class="divider">Or</div>
    <div class="sso" id="sso"></div>
  </div>
</div>
<script>
const $ = (id) => document.getElementById(id);

async function loadProviders() {
  try {
    const list = await fetch("/api/auth/providers").then(r => r.json());
    if (!Array.isArray(list) || list.length === 0) return;
    $("ssoWrap").style.display = "";
    const sso = $("sso");
    list.forEach(p => {
      const a = document.createElement("a");
      a.href = `/auth/${encodeURIComponent(p.slug)}/start`;
      a.textContent = `Sign in with ${p.display_name}`;
      sso.appendChild(a);
    });
  } catch {}
}
loadProviders();

$("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  $("err").textContent = "";
  $("submit").disabled = true;
  try {
    const r = await fetch("/api/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email: $("email").value.trim(), password: $("pw").value }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.detail || "invalid credentials");
    }
    window.location.href = "/";
  } catch (err) {
    $("err").textContent = err.message;
    $("submit").disabled = false;
  }
});
</script>
</body>
</html>
